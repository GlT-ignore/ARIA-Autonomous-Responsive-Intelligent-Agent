<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ARIA - Your Personal AI Assistant</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/src/panel/styles/main.css" />
</head>

<body>
	<!-- Skip navigation (Phase 7 Accessibility) -->
	<a href="#chat-input" class="sr-only"
		style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">Skip to chat input</a>
	<!-- Header -->
	<header>
		<div class="brand">
			<div class="brand-icon">
				<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<path d="M12 2L2 7l10 5 10-5-10-5z" />
					<path d="M2 17l10 5 10-5" />
					<path d="M2 12l10 5 10-5" />
				</svg>
			</div>
			<div class="brand-text">
				<h1>ARIA</h1>
				<span class="tagline">Your Personal AI Assistant</span>
			</div>
		</div>
		<div class="header-actions">
			<button id="btn-analyze" class="icon-btn" title="Analyze page" aria-label="Analyze current page">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<circle cx="11" cy="11" r="8"></circle>
					<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
				</svg>
			</button>
			<button id="btn-settings" class="icon-btn" title="Settings" aria-label="Open settings">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<circle cx="12" cy="12" r="3"></circle>
					<path
						d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
					</path>
				</svg>
			</button>
		</div>
	</header>

	<!-- Progress (compact, above chat) -->
	<div id="progress-container">
		<div class="progress-bar-bg">
			<div class="progress-bar-fill" id="progress-fill" style="width: 0%" role="progressbar" aria-valuenow="0"
				aria-valuemin="0" aria-valuemax="100"></div>
		</div>
		<div id="progress" aria-live="polite">Standby...</div>
	</div>

	<!-- Chat Interface (primary) -->
	<section class="chat-section glass" id="chat-section" aria-label="Conversation">
		<div id="chat-container" role="log" aria-live="polite" aria-relevant="additions"></div>
	</section>

	<!-- Chat Input Bar (always visible at bottom) -->
	<div class="chat-input-bar">
		<button id="btn-voice" class="voice-btn" title="Voice input (Ctrl+M)" aria-label="Start voice input">
			<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
				<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
				<path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
				<line x1="12" y1="19" x2="12" y2="23"></line>
				<line x1="8" y1="23" x2="16" y2="23"></line>
			</svg>
		</button>
		<textarea id="chat-input" placeholder="Ask me anything or describe a task..." autocomplete="off"
			aria-label="Chat input" rows="1"></textarea>
		<button id="btn-send" class="send-btn" title="Send (Enter)" aria-label="Send message">
			<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
				<line x1="22" y1="2" x2="11" y2="13"></line>
				<polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
			</svg>
		</button>
		<button id="btn-stop" class="stop-btn-inline" disabled title="Stop (Ctrl+.)" aria-label="Stop task">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
				<rect x="4" y="4" width="16" height="16" rx="2"></rect>
			</svg>
		</button>
	</div>

	<!-- Hidden legacy elements needed by modules -->
	<input id="task" type="hidden" />
	<input id="sel" type="hidden" />
	<input id="text" type="hidden" />
	<input id="desc" type="hidden" />
	<button id="btn-run-task" style="display:none"></button>

	<!-- Results & Dialogs -->
	<div id="results-container"></div>
	<div id="form-dialog-container">
		<div id="form-dialog-content" class="glass"></div>
	</div>

	<!-- Activity Log (collapsed, dev tool) -->
	<section style="flex-shrink: 0;">
		<details>
			<summary>Activity Log</summary>
			<div class="details-content">
				<pre id="log" aria-label="Debug activity log"></pre>
			</div>
		</details>
	</section>

	<script type="module" src="/src/panel/index.ts"></script>
</body>

</html>
